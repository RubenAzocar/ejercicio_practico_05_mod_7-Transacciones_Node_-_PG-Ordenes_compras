<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Orden | Sistema de Órdenes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="btn btn-outline" style="margin-bottom: 1rem;">← Volver</a>
            <h1>Nueva Orden de Compra</h1>
        </header>

        <main>
            <div class="form-group">
                <label for="rut">RUT Cliente</label>
                <input type="text" id="rut" placeholder="12.345.678-9">
            </div>

            <fieldset style="border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
                <legend style="padding: 0 0.5rem; font-weight: 700; color: var(--primary);">Dirección de Despacho</legend>
                <div class="form-group">
                    <input type="text" id="calle" placeholder="Calle y número">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <input type="text" id="ciudad" placeholder="Ciudad">
                    <input type="text" id="region" placeholder="Región">
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <input type="text" id="cp" placeholder="Código Postal">
                </div>
            </fieldset>

            <section>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="font-weight: 700;">Productos</h3>
                    <button id="agregarBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">+ Agregar Producto</button>
                </div>
                <div id="productos" style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <!-- Líneas de productos dinámicas -->
                </div>
            </section>

            <div style="margin-top: 2rem;">
                <button id="enviarBtn" class="btn btn-primary" style="width: 100%; padding: 1rem;">🚀 Procesar Orden (Transacción ACID)</button>
            </div>

            <pre id="res"></pre>
        </main>
    </div>
    <script src="crear_orden.js"></script>
</body>
</html>
