<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Órdenes | Panel Principal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Gestión</h1>
            <p style="color: var(--text-muted); font-weight: normal; font-size: 1rem;">Módulo de Órdenes de Compra y Stock</p>
        </header>

        <nav style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
            <button id="btnProductos" class="btn btn-primary">📦 Ver Stock</button>
            <button id="btnOrdenes" class="btn btn-primary">📑 Ver Órdenes</button>
            <button id="btnCrearOrden" class="btn btn-primary">➕ Nueva Orden</button>
        </nav>

        <section style="margin-top: 3rem; text-align: center; color: var(--text-muted);">
            <p>Seleccione una opción para comenzar</p>
        </section>
    </div>
    <script src="index.js"></script>
</body>
</html>
